active_profile = "prod"

[profiles.prod]
timezone = "Asia/Shanghai"

# --- T1: Every 6h — sub-daily upstream sources ---

[profiles.prod.jobs.core_l2beat]
mode = "cron"
hour = "0,6,12,18"
minute = 0

[profiles.prod.jobs.core_coingecko]
mode = "cron"
hour = "3,9,15,21"
minute = 15

# --- T2: Every 8h — daily upstream, timely ATH detection ---

[profiles.prod.jobs.core_defillama]
mode = "cron"
hour = "2,10,18"
minute = 30

# --- T3: Once daily — daily-aggregate metrics ---

[profiles.prod.jobs.core_growthepie]
mode = "cron"
hour = 10
minute = 0

[profiles.prod.jobs.core_dune]
mode = "cron"
hour = 10
minute = 20

[profiles.prod.jobs.eco_aave]
mode = "cron"
hour = 11
minute = 0

[profiles.prod.jobs.eco_protocols]
mode = "cron"
hour = 11
minute = 20

# --- T4: Daily — operational tasks ---

[profiles.prod.jobs.daily_summary]
mode = "cron"
hour = 9
minute = 5

[profiles.prod.jobs.watchlist_refresh]
mode = "cron"
hour = 4
minute = 0

# --- Utility: Hourly health probe ---

[profiles.prod.jobs.source_health]
mode = "cron"
hour = "*"
minute = 45

# ======================================================================

[profiles.dev_live]
timezone = "Asia/Shanghai"

[profiles.dev_live.jobs.core_defillama]
mode = "interval"
minutes = 10

[profiles.dev_live.jobs.core_growthepie]
mode = "manual"

[profiles.dev_live.jobs.core_l2beat]
mode = "interval"
minutes = 10

[profiles.dev_live.jobs.core_dune]
mode = "manual"

[profiles.dev_live.jobs.core_coingecko]
mode = "interval"
minutes = 10

[profiles.dev_live.jobs.daily_summary]
mode = "manual"

[profiles.dev_live.jobs.eco_aave]
mode = "manual"

[profiles.dev_live.jobs.eco_protocols]
mode = "manual"

[profiles.dev_live.jobs.watchlist_refresh]
mode = "manual"

[profiles.dev_live.jobs.source_health]
mode = "interval"
minutes = 2

# ======================================================================

[profiles.ci]
scheduler_enabled = false
timezone = "Asia/Shanghai"

[profiles.ci.jobs.core_defillama]
mode = "disabled"

[profiles.ci.jobs.core_growthepie]
mode = "disabled"

[profiles.ci.jobs.core_l2beat]
mode = "disabled"

[profiles.ci.jobs.core_dune]
mode = "disabled"

[profiles.ci.jobs.core_coingecko]
mode = "disabled"

[profiles.ci.jobs.daily_summary]
mode = "disabled"

[profiles.ci.jobs.eco_aave]
mode = "disabled"

[profiles.ci.jobs.eco_protocols]
mode = "disabled"

[profiles.ci.jobs.watchlist_refresh]
mode = "disabled"

[profiles.ci.jobs.source_health]
mode = "disabled"

[profiles.dev_live.jobs.core_l2beat]
mode = "interval"
minutes = 10

[profiles.dev_live.jobs.core_dune]
mode = "manual"

[profiles.dev_live.jobs.core_coingecko]
mode = "interval"
minutes = 10

[profiles.dev_live.jobs.daily_summary]
mode = "manual"

[profiles.dev_live.jobs.eco_aave]
mode = "manual"

[profiles.dev_live.jobs.eco_protocols]
mode = "manual"

[profiles.dev_live.jobs.watchlist_refresh]
mode = "manual"

[profiles.dev_live.jobs.source_health]
mode = "interval"
minutes = 2


active_profile = "prod"

[profiles.prod]
timezone = "Asia/Shanghai"

# --- T1: Hourly — real-time ATH / milestone detection within 1 hour ---

[profiles.prod.jobs.core_defillama_tvl]
mode = "cron"
hour = "*"
minute = 0

# --- T2: Every 4 hours — near-real-time metrics ---

[profiles.prod.jobs.core_defillama]
mode = "cron"
hour = "0,4,8,12,16,20"
minute = 5

[profiles.prod.jobs.core_l2beat]
mode = "cron"
hour = "1,5,9,13,17,21"
minute = 20

[profiles.prod.jobs.core_coingecko]
mode = "cron"
hour = "2,6,10,14,18,22"
minute = 40

# --- T3: Twice daily — daily-aggregate metrics ---

[profiles.prod.jobs.core_growthepie]
mode = "cron"
hour = "10,18"
minute = 10

[profiles.prod.jobs.core_dune]
mode = "cron"
hour = "10,18"
minute = 30

[profiles.prod.jobs.eco_aave]
mode = "cron"
hour = "10,18"
minute = 50

[profiles.prod.jobs.eco_protocols]
mode = "cron"
hour = "11,19"
minute = 0

# --- T4: Daily — operational tasks ---

[profiles.prod.jobs.daily_summary]
mode = "cron"
hour = 9
minute = 5

[profiles.prod.jobs.watchlist_refresh]
mode = "cron"
hour = 4
minute = 0

# --- Utility: Hourly health probe ---

[profiles.prod.jobs.source_health]
mode = "cron"
hour = "*"
minute = 45

